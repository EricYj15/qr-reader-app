<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de QR Code - Estações</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 400px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 24px; }
    h1 { font-size: 1.4em; text-align: center; }
    #reader { width: 100%; margin: 16px 0; }
    ul { list-style: none; padding: 0; }
    li { background: #e3f7e3; margin: 6px 0; padding: 8px 12px; border-radius: 4px; font-size: 1.1em; transition: background 0.2s; }
    .duplicate { background: #ffe066 !important; color: #222 !important; }
    .copy-btn { background: #4cafef; color: #111; border: none; padding: 10px 0; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
    .clear-btn { background: #e74c3c; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 12px; width: 100%; }
    .clear-btn:hover { background: #c0392b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Leitor de QR Code - Estações</h1>
    <div id="reader"></div>
    <div id="camera-error" style="display:none; color:#c0392b; text-align:center; margin:12px 0;"></div>
    <button id="retry-btn" style="display:none; background:#2980b9; color:#fff; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; width:100%; margin-bottom:10px;" onclick="startScanner()">Tentar novamente acessar câmera</button>
    <div style="font-size:0.95em; color:#555; margin-bottom:10px; text-align:center;">Se estiver no celular, use o Chrome ou Safari e permita o acesso à câmera. Em alguns casos, só funciona via HTTPS.</div>
    <ul id="station-list"></ul>
    <button id="btn-copy" class="copy-btn">Copiar códigos</button>
  </div>
  <audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script>

    // Persistência local
    const STORAGE_KEY = 'qr-stations-list';
    let stationList = [];
    const listElement = document.getElementById('station-list');
    const beep = document.getElementById('beep');
    let lastDuplicate = null;

    function loadList() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) stationList = JSON.parse(data);
      } catch {}
    }
    function saveList() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(stationList));
    }

    function renderList(highlightCode) {
      listElement.innerHTML = '';
      stationList.forEach(code => {
        const li = document.createElement('li');
        li.textContent = code;
        if (highlightCode && code === highlightCode) {
          li.classList.add('duplicate');
        }
        listElement.appendChild(li);
      });
    }

    function playFeedback() {
      beep.currentTime = 0;
      beep.play();
      if (navigator.vibrate) navigator.vibrate(30);
    }
    function playDuplicateFeedback() {
      if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    }

    function onScanSuccess(decodedText) {
      if (!stationList.includes(decodedText)) {
        stationList.push(decodedText);
        saveList();
        renderList(decodedText);
        playFeedback();
        lastDuplicate = null;
      } else {
        renderList(decodedText);
        playDuplicateFeedback();
        lastDuplicate = decodedText;
        setTimeout(() => renderList(), 800);
      }
    }



    let html5QrCode;
    function startScanner() {
      document.getElementById('camera-error').style.display = 'none';
      document.getElementById('retry-btn').style.display = 'none';
      document.getElementById('reader').innerHTML = '';
      if (html5QrCode) {
        html5QrCode.stop().catch(()=>{});
      }
      html5QrCode = new Html5Qrcode("reader");
      // Sempre tenta usar a câmera traseira (environment) para mobile
      const config = { fps: 10, qrbox: 250, facingMode: { exact: "environment" } };
      html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess
      ).catch(err => {
        // Se falhar, tenta a primeira câmera disponível
        Html5Qrcode.getCameras().then(cameras => {
          if (cameras && cameras.length) {
            html5QrCode.start(
              cameras[0].id,
              { fps: 10, qrbox: 250 },
              onScanSuccess
            ).catch(err2 => {
              document.getElementById('reader').innerHTML = '';
              document.getElementById('camera-error').style.display = 'block';
              document.getElementById('camera-error').innerText = 'Erro ao acessar a câmera.\nPermita o acesso e tente novamente.';
              document.getElementById('retry-btn').style.display = 'block';
            });
          } else {
            document.getElementById('reader').innerHTML = 'Nenhuma câmera encontrada.';
          }
        }).catch(() => {
          document.getElementById('reader').innerHTML = '';
          document.getElementById('camera-error').style.display = 'block';
          document.getElementById('camera-error').innerText = 'Erro ao acessar a câmera.\nPermita o acesso e tente novamente.';
          document.getElementById('retry-btn').style.display = 'block';
        });
      });
    }
    // Botão copiar códigos
    document.getElementById('btn-copy').onclick = function() {
      if (!stationList.length) return alert('Nenhum código para copiar!');
      const text = stationList.join('\n');
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('camera-error').style.display = 'block';
        document.getElementById('camera-error').style.color = '#18c29c';
        document.getElementById('camera-error').innerText = 'Códigos copiados!';
        setTimeout(() => {
          document.getElementById('camera-error').style.display = 'none';
          document.getElementById('camera-error').style.color = '#c0392b';
        }, 1200);
      }, () => {
        alert('Erro ao copiar para a área de transferência.');
      });
    };

    // Inicia ao carregar
    loadList();
    renderList();
    startScanner();
  </script>
</body>
</html>
